<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Walkie Talkie · Voz en Tiempo Real</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Sora', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    .hdr {
      flex-shrink: 0;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 18px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .hdr-brand { flex: 1; }
    .hdr-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e293b;
    }
    .hdr-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.1rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      margin-top: 3px;
    }
    .pill.on {
      background: rgba(46,125,50,0.1);
      color: #2e7d32;
      border: 1px solid rgba(46,125,50,0.3);
    }
    .pill.off {
      background: rgba(237,108,2,0.08);
      color: #ed6c02;
      border: 1px solid rgba(237,108,2,0.3);
    }
    .pill.warning {
      background: rgba(237,108,2,0.15);
      color: #ed6c02;
      border: 1px solid rgba(237,108,2,0.4);
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .dot.pulse {
      animation: pulseDot 1s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .ibtn {
      width: 38px;
      height: 38px;
      background: #f0f2f5;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ibtn:active { transform: scale(0.92); }

    .walkie-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .radio-card {
      background: white;
      border-radius: 32px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      padding: 28px 20px 32px;
      text-align: center;
    }
    .channel-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 8px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #667eea20, #764ba220);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: monospace;
      color: #667eea;
    }
    .device-id {
      font-size: 0.65rem;
      color: #94a3b8;
      font-family: monospace;
      background: #f8fafc;
      padding: 4px 8px;
      border-radius: 8px;
    }

    .ptt-container { margin: 20px 0; }
    .ptt-btn {
      width: 160px;
      height: 160px;
      background: linear-gradient(145deg, #f0f2f5, #ffffff);
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: all 0.08s linear;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      border: 3px solid rgba(102,126,234,0.3);
      position: relative;
    }
    .ptt-btn i {
      font-size: 3.8rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      transition: all 0.05s;
    }
    .ptt-btn span {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1e293b;
    }
    .ptt-btn.active {
      transform: scale(0.94);
      background: linear-gradient(145deg, #e0e7ff, #ede9fe);
      border-color: #667eea;
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }
    .ptt-btn.active i {
      animation: micWave 0.4s infinite alternate;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
    }
    @keyframes micWave {
      0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(102,126,234,0)); }
      100% { transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(102,126,234,0.5)); }
    }

    .voice-indicator { margin-top: 20px; }
    .vumeter {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
    }
    .vumeter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.05s linear;
      border-radius: 10px;
    }
    .status-text {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 12px;
      font-family: monospace;
      font-weight: 600;
    }
    .led-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0;
    }
    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e1;
      transition: all 0.1s;
    }
    .led.active {
      background: #2e7d32;
      box-shadow: 0 0 6px #2e7d32;
      animation: blink 0.8s infinite;
    }
    .led.recording {
      background: #d32f2f;
      box-shadow: 0 0 8px #d32f2f;
      animation: blinkFast 0.4s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes blinkFast {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .devices-panel {
      margin-top: 24px;
      background: #f8fafc;
      border-radius: 20px;
      padding: 12px;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .devices-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .devices-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 100px;
      overflow-y: auto;
    }
    .device-chip {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-family: monospace;
      color: #667eea;
      cursor: pointer;
      transition: all 0.2s;
    }
    .device-chip:active {
      transform: scale(0.95);
    }
    .device-chip.self {
      background: linear-gradient(135deg, #667eea20, #764ba220);
      border-color: #667eea;
      font-weight: 600;
    }
    .device-chip.remote-speaking {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border-color: #f59e0b;
      animation: pulseOrange 0.5s infinite;
    }
    @keyframes pulseOrange {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    .control-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .sec-btn {
      background: #f0f2f5;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .sec-btn:active { transform: scale(0.94); }

    .connection-panel {
      margin-top: 16px;
      padding: 12px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: 16px;
      border: 1px solid #f59e0b;
    }
    .connection-panel input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.8rem;
      font-family: monospace;
      margin-top: 8px;
      text-align: center;
    }
    .connection-panel button {
      margin-top: 8px;
      width: 100%;
    }

    footer {
      padding: 12px 18px calc(12px + env(safe-area-inset-bottom,0px));
      text-align: center;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.2);
    }
    .toast-msg {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.7rem;
      z-index: 1000;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      white-space: nowrap;
      font-family: monospace;
    }
    .toast-msg.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }
    @media (max-width: 500px) {
      .ptt-btn { width: 140px; height: 140px; }
      .ptt-btn i { font-size: 3.2rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-title">
        <span class="hdr-icon"><i class="bi bi-mic"></i></span>
        Walkie Talkie PRO
      </div>
      <div id="connPill" class="pill on">
        <span class="dot pulse"></span>
        <span id="connStatus">Conectando...</span>
      </div>
    </div>
    <div class="hdr-acts">
      <button class="ibtn" id="shareBtn" title="Compartir ID"><i class="bi bi-share"></i></button>
    </div>
  </header>

  <div class="walkie-main">
    <div class="radio-card">
      <div class="channel-info">
        <div class="channel-badge"><i class="bi bi-cloud-check"></i> PEERJS CLOUD · GLOBAL</div>
        <div class="device-id" id="deviceIdDisplay">ID: ----</div>
      </div>

      <div class="ptt-container">
        <div id="pttButton" class="ptt-btn">
          <i class="bi bi-mic-fill"></i>
          <span>PULSAR HABLAR</span>
        </div>
        <div class="voice-indicator">
          <div class="vumeter">
            <div class="vumeter-fill" id="vumeterFill"></div>
          </div>
          <div class="status-text" id="statusText">🎤 Iniciando...</div>
          <div class="led-group">
            <div class="led" id="txLed"></div>
            <div class="led" id="rxLed"></div>
            <div class="led" id="netLed"></div>
          </div>
        </div>
      </div>

      <div class="devices-panel">
        <div class="devices-title">
          <i class="bi bi-diagram-3"></i> Dispositivos conectados
        </div>
        <div class="devices-list" id="devicesList">
          <span class="device-chip">🔄 Conectando a red PeerJS...</span>
        </div>
      </div>

      <div class="connection-panel">
        <i class="bi bi-link-45deg"></i> <strong>Conectar con otro dispositivo</strong><br>
        <small>Pide el ID del otro dispositivo y pégalo aquí:</small>
        <input type="text" id="remoteIdInput" placeholder="Ej: 8a3f9b2c-1d4e-5f6a-7b8c-9d0e1f2a3b4c" autocomplete="off">
        <button class="sec-btn" id="connectBtn" style="width: 100%; margin-top: 8px;"><i class="bi bi-plus-circle"></i> Conectar</button>
      </div>

      <div class="control-bar">
        <button class="sec-btn" id="testAudioBtn"><i class="bi bi-headphones"></i> Probar audio</button>
        <button class="sec-btn" id="copyIdBtn"><i class="bi bi-copy"></i> Copiar mi ID</button>
        <button class="sec-btn" id="disconnectAllBtn"><i class="bi bi-x-circle"></i> Desconectar todos</button>
      </div>
    </div>
  </div>
  <footer>
    <i class="bi bi-globe2"></i> Comunicación global vía PeerJS · Presiona para hablar
  </footer>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
  class RealTimeWalkieTalkie {
    constructor() {
      this.localStream = null;
      this.peer = null;
      this.connections = new Map(); // peerId -> MediaConnection
      this.remoteAudioElements = new Map();
      this.isTransmitting = false;
      this.myId = null;
      this.devices = new Map(); // peerId -> { name, lastSeen, call }
      this.currentSpeaker = null;
      
      // Elementos DOM
      this.pttBtn = document.getElementById('pttButton');
      this.statusText = document.getElementById('statusText');
      this.vumeterFill = document.getElementById('vumeterFill');
      this.txLed = document.getElementById('txLed');
      this.rxLed = document.getElementById('rxLed');
      this.netLed = document.getElementById('netLed');
      this.devicesList = document.getElementById('devicesList');
      this.deviceIdDisplay = document.getElementById('deviceIdDisplay');
      this.connStatusSpan = document.getElementById('connStatus');
      this.connPill = document.getElementById('connPill');
      this.remoteIdInput = document.getElementById('remoteIdInput');
      this.connectBtn = document.getElementById('connectBtn');
      
      this.init();
    }
    
    async init() {
      await this.initMicrophone();
      this.initPeerJS();
      this.setupUIEvents();
    }
    
    async initMicrophone() {
      try {
        this.localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: 48000,
            channelCount: 1
          }
        });
        
        // Inicializar AudioContext para VU meter
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(this.localStream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        
        this.startVUMeter(analyser);
        this.statusText.innerHTML = '🎤 Micrófono listo · Presiona para hablar';
        this.showToast('✅ Micrófono activado', 2000);
        
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }
        
      } catch (err) {
        console.error('Error micrófono:', err);
        this.statusText.innerHTML = '❌ Error: Sin acceso al micrófono';
        this.showToast('❌ No se pudo acceder al micrófono. Revisa permisos.', 3000);
      }
    }
    
    startVUMeter(analyser) {
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      const updateVU = () => {
        if (!this.vumeterFill) return;
        analyser.getByteTimeDomainData(dataArray);
        let maxSample = 0;
        for (let i = 0; i < dataArray.length; i++) {
          const v = (dataArray[i] - 128) / 128;
          maxSample = Math.max(maxSample, Math.abs(v));
        }
        let level = Math.min(100, maxSample * 100);
        if (this.isTransmitting) {
          level = Math.max(level, 15);
          this.vumeterFill.style.width = level + '%';
        } else {
          this.vumeterFill.style.width = '0%';
        }
        requestAnimationFrame(updateVU);
      };
      updateVU();
    }
    
    initPeerJS() {
      // Crear ID único para este dispositivo
      const savedId = localStorage.getItem('walkie_peer_id');
      if (savedId) {
        this.myId = savedId;
      } else {
        this.myId = 'walkie-' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('walkie_peer_id', this.myId);
      }
      
      this.deviceIdDisplay.textContent = `ID: ${this.myId.substring(0, 12)}...`;
      
      // Conectar a PeerJS Cloud
      this.peer = new Peer(this.myId, {
        host: '0.peerjs.com',
        port: 443,
        path: '/',
        secure: true,
        debug: 2
      });
      
      this.peer.on('open', (id) => {
        console.log('PeerJS conectado con ID:', id);
        this.myId = id;
        this.deviceIdDisplay.textContent = `ID: ${id.substring(0, 12)}...`;
        this.netLed.classList.add('active');
        this.connStatusSpan.innerHTML = '🌐 En línea';
        this.connPill.classList.add('on');
        this.showToast('✅ Conectado a red global. Comparte tu ID para conectar.', 4000);
        this.updateDevicesList();
      });
      
      this.peer.on('connection', (conn) => {
        console.log('Nueva conexión de datos:', conn.peer);
        this.handleDataConnection(conn);
      });
      
      this.peer.on('call', (call) => {
        console.log('Llamada entrante de:', call.peer);
        this.handleIncomingCall(call);
      });
      
      this.peer.on('error', (err) => {
        console.error('PeerJS error:', err);
        if (err.type === 'unavailable-id') {
          // Si el ID ya existe, generar uno nuevo
          this.myId = 'walkie-' + Math.random().toString(36).substring(2, 15);
          localStorage.setItem('walkie_peer_id', this.myId);
          this.peer.destroy();
          this.initPeerJS();
        } else {
          this.showToast('❌ Error de conexión: ' + err.type, 3000);
          this.connStatusSpan.innerHTML = '⚠️ Error';
          this.connPill.classList.add('off');
          this.connPill.classList.remove('on');
          this.netLed.classList.remove('active');
        }
      });
      
      this.peer.on('disconnected', () => {
        console.log('PeerJS desconectado');
        this.netLed.classList.remove('active');
        this.connStatusSpan.innerHTML = '⭕ Desconectado';
        this.connPill.classList.remove('on');
        this.connPill.classList.add('off');
        this.showToast('⚠️ Desconectado del servidor. Reconectando...', 2000);
        
        // Intentar reconectar
        setTimeout(() => {
          if (this.peer) this.peer.reconnect();
        }, 3000);
      });
    }
    
    handleIncomingCall(call) {
      // Responder a la llamada con el stream local
      call.answer(this.localStream);
      
      call.on('stream', (remoteStream) => {
        console.log('Recibiendo audio de:', call.peer);
        this.handleRemoteStream(remoteStream, call.peer);
      });
      
      call.on('close', () => {
        console.log('Llamada cerrada con:', call.peer);
        this.removeConnection(call.peer);
      });
      
      call.on('error', (err) => {
        console.error('Error en llamada:', err);
        this.removeConnection(call.peer);
      });
      
      this.connections.set(call.peer, call);
      this.addDevice(call.peer, call);
    }
    
    handleRemoteStream(stream, peerId) {
      let audio = this.remoteAudioElements.get(peerId);
      if (!audio) {
        audio = new Audio();
        audio.autoplay = true;
        audio.playsInline = true;
        audio.style.display = 'none';
        document.body.appendChild(audio);
        this.remoteAudioElements.set(peerId, audio);
      }
      
      audio.srcObject = stream;
      
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(e => {
          console.log('Autoplay bloqueado:', e);
          // El usuario ya interactuará con el botón PTT
        });
      }
    }
    
    handleDataConnection(conn) {
      conn.on('data', (data) => {
        if (data.type === 'start-transmit' && data.from !== this.myId) {
          this.handleStartTransmit(data.from);
        } else if (data.type === 'stop-transmit' && data.from !== this.myId) {
          this.handleStopTransmit(data.from);
        }
      });
      
      // Guardar la conexión de datos
      this.dataConnections.set(conn.peer, conn);
    }
    
    connectToPeer(remoteId) {
      if (!remoteId || remoteId === this.myId) {
        this.showToast('❌ No puedes conectarte a ti mismo', 2000);
        return;
      }
      
      if (this.connections.has(remoteId)) {
        this.showToast('⚠️ Ya estás conectado a este dispositivo', 2000);
        return;
      }
      
      this.showToast(`📞 Conectando a ${remoteId.substring(0, 12)}...`, 2000);
      
      // Crear conexión de datos para señalización
      const dataConn = this.peer.connect(remoteId);
      dataConn.on('open', () => {
        console.log('Conexión de datos abierta con:', remoteId);
        if (!this.dataConnections) this.dataConnections = new Map();
        this.dataConnections.set(remoteId, dataConn);
      });
      
      // Realizar llamada de audio
      const call = this.peer.call(remoteId, this.localStream);
      
      call.on('stream', (remoteStream) => {
        console.log('Stream recibido de:', remoteId);
        this.handleRemoteStream(remoteStream, remoteId);
      });
      
      call.on('close', () => {
        console.log('Llamada cerrada con:', remoteId);
        this.removeConnection(remoteId);
      });
      
      call.on('error', (err) => {
        console.error('Error en llamada:', err);
        this.showToast(`❌ Error conectando con ${remoteId.substring(0, 12)}`, 3000);
        this.removeConnection(remoteId);
      });
      
      this.connections.set(remoteId, call);
      this.addDevice(remoteId, call);
    }
    
    addDevice(peerId, call) {
      if (!this.devices.has(peerId) && peerId !== this.myId) {
        this.devices.set(peerId, { 
          name: peerId.substring(0, 12), 
          lastSeen: Date.now(), 
          call: call 
        });
        this.updateDevicesList();
        this.showToast(`📡 ${peerId.substring(0, 12)} conectado`, 2000);
      }
    }
    
    removeConnection(peerId) {
      if (this.connections.has(peerId)) {
        this.connections.delete(peerId);
      }
      if (this.dataConnections && this.dataConnections.has(peerId)) {
        this.dataConnections.delete(peerId);
      }
      if (this.devices.has(peerId)) {
        this.devices.delete(peerId);
      }
      const audio = this.remoteAudioElements.get(peerId);
      if (audio) {
        audio.pause();
        audio.srcObject = null;
        this.remoteAudioElements.delete(peerId);
      }
      this.updateDevicesList();
      this.showToast(`📡 Dispositivo desconectado`, 1500);
    }
    
    updateDevicesList() {
      const devices = Array.from(this.devices.keys());
      if (devices.length === 0) {
        this.devicesList.innerHTML = '<span class="device-chip">📻 Esperando conexiones...<br><small>Comparte tu ID para conectar</small></span>';
        return;
      }
      
      this.devicesList.innerHTML = devices.map(id => {
        const isSpeaking = this.currentSpeaker === id;
        const shortId = id.substring(0, 12);
        return `<span class="device-chip ${isSpeaking ? 'remote-speaking' : ''}" onclick="window.walkie.connectToPeer('${id}')">
          ${isSpeaking ? '🔴 ' : '📡 '}${shortId}${isSpeaking ? ' HABLANDO' : ''}
        </span>`;
      }).join('');
    }
    
    sendSignalingToAll(type) {
      this.connections.forEach((call, peerId) => {
        if (this.dataConnections && this.dataConnections.has(peerId)) {
          this.dataConnections.get(peerId).send({
            type: type,
            from: this.myId
          });
        }
      });
    }
    
    startTransmitting() {
      if (this.isTransmitting || !this.localStream) return;
      this.isTransmitting = true;
      this.txLed.classList.add('recording');
      this.statusText.innerHTML = '🔴 TRANSMITIENDO · Hablando...';
      
      // Habilitar todos los tracks en todas las conexiones
      this.connections.forEach((call) => {
        if (call.peerConnection) {
          const senders = call.peerConnection.getSenders();
          senders.forEach(sender => {
            if (sender.track) sender.track.enabled = true;
          });
        }
      });
      
      // Notificar a otros
      this.sendSignalingToAll('start-transmit');
      
      if (navigator.vibrate) navigator.vibrate(50);
    }
    
    stopTransmitting() {
      if (!this.isTransmitting) return;
      this.isTransmitting = false;
      this.txLed.classList.remove('recording');
      this.statusText.innerHTML = '🎙️ Listo · Presiona para hablar';
      
      // Deshabilitar envío de audio
      this.connections.forEach((call) => {
        if (call.peerConnection) {
          const senders = call.peerConnection.getSenders();
          senders.forEach(sender => {
            if (sender.track) sender.track.enabled = false;
          });
        }
      });
      
      // Notificar fin
      this.sendSignalingToAll('stop-transmit');
      
      if (navigator.vibrate) navigator.vibrate(40);
    }
    
    handleStartTransmit(fromId) {
      this.currentSpeaker = fromId;
      this.rxLed.classList.add('active');
      this.statusText.innerHTML = `📢 ${fromId.substring(0, 12)} está hablando...`;
      this.updateDevicesList();
      
      setTimeout(() => {
        if (!this.isTransmitting && this.currentSpeaker === fromId) {
          this.currentSpeaker = null;
          this.statusText.innerHTML = '🎙️ Listo · Presiona para hablar';
          this.updateDevicesList();
        }
        this.rxLed.classList.remove('active');
      }, 3000);
    }
    
    handleStopTransmit(fromId) {
      if (this.currentSpeaker === fromId) {
        this.currentSpeaker = null;
        this.rxLed.classList.remove('active');
        if (!this.isTransmitting) {
          this.statusText.innerHTML = '🎙️ Listo · Presiona para hablar';
        }
        this.updateDevicesList();
      }
    }
    
    disconnectAll() {
      this.connections.forEach((call, peerId) => {
        call.close();
        this.removeConnection(peerId);
      });
      this.connections.clear();
      if (this.dataConnections) this.dataConnections.clear();
      this.devices.clear();
      this.updateDevicesList();
      this.showToast('✅ Desconectado de todos los dispositivos', 2000);
    }
    
    setupUIEvents() {
      // Push to Talk
      const startPTT = (e) => {
        e.preventDefault();
        this.startTransmitting();
      };
      
      const stopPTT = () => {
        this.stopTransmitting();
      };
      
      this.pttBtn.addEventListener('mousedown', startPTT);
      this.pttBtn.addEventListener('mouseup', stopPTT);
      this.pttBtn.addEventListener('mouseleave', stopPTT);
      this.pttBtn.addEventListener('touchstart', startPTT, { passive: false });
      this.pttBtn.addEventListener('touchend', stopPTT);
      this.pttBtn.addEventListener('touchcancel', stopPTT);
      
      // Conectar a dispositivo remoto
      this.connectBtn.addEventListener('click', () => {
        const remoteId = this.remoteIdInput.value.trim();
        if (remoteId) {
          this.connectToPeer(remoteId);
          this.remoteIdInput.value = '';
        } else {
          this.showToast('❌ Ingresa un ID válido', 2000);
        }
      });
      
      this.remoteIdInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          this.connectBtn.click();
        }
      });
      
      // Test audio
      document.getElementById('testAudioBtn').addEventListener('click', () => {
        this.testAudio();
      });
      
      // Copy ID
      document.getElementById('copyIdBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(this.myId);
        this.showToast('📋 ID copiado: ' + this.myId.substring(0, 12) + '...', 2000);
      });
      
      // Disconnect all
      document.getElementById('disconnectAllBtn').addEventListener('click', () => {
        this.disconnectAll();
      });
      
      // Share
      document.getElementById('shareBtn').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({
            title: 'Walkie Talkie',
            text: `Mi ID de Walkie Talkie: ${this.myId}`,
            url: window.location.href
          });
        } else {
          this.showToast('📋 Mi ID: ' + this.myId, 3000);
        }
      });
    }
    
    testAudio() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      
      oscillator.frequency.value = 880;
      gain.gain.value = 0.3;
      
      oscillator.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
      oscillator.stop(audioCtx.currentTime + 0.5);
      
      this.showToast('🔊 Audio de prueba', 1000);
    }
    
    showToast(msg, duration = 2000) {
      const toast = document.getElementById('toastMsg');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }
  }
  
  // Iniciar app
  document.addEventListener('DOMContentLoaded', () => {
    window.walkie = new RealTimeWalkieTalkie();
  });
</script>
