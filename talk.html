<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Walkie Talkie · Voz en Tiempo Real</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f5f7fa;
      font-family: 'Sora', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 55% at 10% -5%, rgba(0,86,179,0.03) 0%, transparent 60%),
                  radial-gradient(ellipse 70% 45% at 90% 105%, rgba(42,130,218,0.03) 0%, transparent 60%);
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }

    /* Header */
    .hdr {
      flex-shrink: 0;
      padding: calc(12px + env(safe-area-inset-top, 0px)) 18px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .hdr-brand {
      flex: 1;
    }
    .hdr-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e293b;
    }
    .hdr-icon {
      width: 32px;
      height: 32px;
      background: rgba(0,86,179,0.08);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0056b3;
      font-size: 1.1rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      margin-top: 3px;
    }
    .pill.on {
      background: rgba(46,125,50,0.1);
      color: #2e7d32;
      border: 1px solid rgba(46,125,50,0.3);
    }
    .pill.off {
      background: rgba(237,108,2,0.08);
      color: #ed6c02;
      border: 1px solid rgba(237,108,2,0.3);
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .dot.pulse {
      animation: pulseDot 1s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .ibtn {
      width: 38px;
      height: 38px;
      background: #f0f2f5;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #475569;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ibtn:active {
      transform: scale(0.92);
    }

    /* Walkie Principal */
    .walkie-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }
    .radio-card {
      background: white;
      border-radius: 32px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 12px 32px rgba(0,0,0,0.05);
      padding: 28px 20px 32px;
      text-align: center;
    }
    .channel-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 8px;
    }
    .channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,86,179,0.08);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: monospace;
      color: #0056b3;
    }
    .device-id {
      font-size: 0.65rem;
      color: #94a3b8;
      font-family: monospace;
    }

    /* Botón PTT (Push to Talk) */
    .ptt-container {
      margin: 20px 0;
    }
    .ptt-btn {
      width: 150px;
      height: 150px;
      background: linear-gradient(145deg, #f0f2f5, #ffffff);
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: all 0.08s linear;
      box-shadow: 0 15px 30px rgba(0,0,0,0.12);
      border: 3px solid rgba(0,86,179,0.2);
      position: relative;
    }
    .ptt-btn i {
      font-size: 3.5rem;
      color: #0056b3;
      transition: all 0.05s;
    }
    .ptt-btn span {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1e293b;
    }
    .ptt-btn.active {
      transform: scale(0.94);
      background: radial-gradient(circle at 30% 25%, #e0ebff, #d0e0ff);
      border-color: #0056b3;
      box-shadow: 0 5px 20px rgba(0,86,179,0.4);
    }
    .ptt-btn.active i {
      animation: micWave 0.4s infinite alternate;
      color: #004494;
    }
    @keyframes micWave {
      0% { transform: scale(1); text-shadow: 0 0 0 rgba(0,86,179,0); }
      100% { transform: scale(1.1); text-shadow: 0 0 8px rgba(0,86,179,0.5); }
    }

    /* Indicadores */
    .voice-indicator {
      margin-top: 20px;
    }
    .vumeter {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
    }
    .vumeter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2e7d32, #0056b3);
      transition: width 0.05s linear;
      border-radius: 10px;
    }
    .status-text {
      font-size: 0.75rem;
      color: #475569;
      margin-top: 12px;
      font-family: monospace;
    }
    .led-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0;
    }
    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e1;
      transition: all 0.1s;
    }
    .led.active {
      background: #2e7d32;
      box-shadow: 0 0 6px #2e7d32;
      animation: blink 0.8s infinite;
    }
    .led.recording {
      background: #d32f2f;
      box-shadow: 0 0 8px #d32f2f;
      animation: blinkFast 0.4s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes blinkFast {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Lista de dispositivos conectados */
    .devices-panel {
      margin-top: 24px;
      background: #f8fafc;
      border-radius: 20px;
      padding: 12px;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .devices-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .devices-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .device-chip {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-family: monospace;
      color: #0056b3;
    }
    .device-chip.self {
      background: rgba(0,86,179,0.1);
      border-color: #0056b3;
    }

    .control-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }
    .sec-btn {
      background: #f0f2f5;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .sec-btn:active {
      transform: scale(0.94);
    }

    footer {
      padding: 12px 18px calc(12px + env(safe-area-inset-bottom,0px));
      text-align: center;
      font-size: 0.65rem;
      color: #94a3b8;
      border-top: 1px solid rgba(0,0,0,0.05);
      background: rgba(255,255,255,0.8);
    }
    .toast-msg {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.7rem;
      z-index: 1000;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      white-space: nowrap;
      font-family: monospace;
    }
    .toast-msg.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-10px);
    }
    @media (max-width: 500px) {
      .ptt-btn { width: 130px; height: 130px; }
      .ptt-btn i { font-size: 2.8rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-title">
        <span class="hdr-icon"><i class="bi bi-mic"></i></span>
        Walkie Talkie RT
      </div>
      <div id="connPill" class="pill on">
        <span class="dot pulse"></span>
        <span id="connStatus">En línea</span>
      </div>
    </div>
    <div class="hdr-acts">
      <button class="ibtn" id="shareBtn" title="Compartir enlace"><i class="bi bi-share"></i></button>
    </div>
  </header>

  <div class="walkie-main">
    <div class="radio-card">
      <div class="channel-info">
        <div class="channel-badge"><i class="bi bi-broadcast"></i> CANAL VOZ · BODEGA</div>
        <div class="device-id" id="deviceIdDisplay">ID: ----</div>
      </div>

      <div class="ptt-container">
        <div id="pttButton" class="ptt-btn">
          <i class="bi bi-mic-fill"></i>
          <span>PULSAR HABLAR</span>
        </div>
        <div class="voice-indicator">
          <div class="vumeter">
            <div class="vumeter-fill" id="vumeterFill"></div>
          </div>
          <div class="status-text" id="statusText">🔘 Listo · Presiona para hablar</div>
          <div class="led-group">
            <div class="led" id="txLed"></div>
            <div class="led" id="rxLed"></div>
            <div class="led" id="netLed"></div>
          </div>
        </div>
      </div>

      <div class="devices-panel">
        <div class="devices-title">
          <i class="bi bi-diagram-3"></i> Handhelds conectados
        </div>
        <div class="devices-list" id="devicesList">
          <span class="device-chip">🔄 Conectando...</span>
        </div>
      </div>

      <div class="control-bar">
        <button class="sec-btn" id="testAudioBtn"><i class="bi bi-headphones"></i> Probar audio</button>
        <button class="sec-btn" id="copyIdBtn"><i class="bi bi-copy"></i> Copiar ID</button>
      </div>
    </div>
  </div>
  <footer>
    <i class="bi bi-wifi"></i> Voz en tiempo real · Push to Talk · WebRTC + WebSocket
  </footer>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
  // ==================== WALKIE TALKIE EN TIEMPO REAL ====================
  // Usa WebRTC + WebSocket (servidor público de señalización) para audio en vivo
  // Comunicación P2P con latencia mínima, voz en tiempo real mientras se mantiene presionado
  
  class RealTimeWalkieTalkie {
    constructor() {
      this.localStream = null;
      this.peerConnections = new Map(); // id -> RTCPeerConnection
      this.audioContext = null;
      this.sourceNode = null;
      this.processorNode = null;
      this.isTransmitting = false;
      this.deviceId = this.generateDeviceId();
      this.devices = new Map(); // id -> { name, lastSeen }
      this.ws = null;
      this.reconnectAttempts = 0;
      this.vumeterInterval = null;
      
      // Elementos DOM
      this.pttBtn = document.getElementById('pttButton');
      this.statusText = document.getElementById('statusText');
      this.vumeterFill = document.getElementById('vumeterFill');
      this.txLed = document.getElementById('txLed');
      this.rxLed = document.getElementById('rxLed');
      this.netLed = document.getElementById('netLed');
      this.devicesList = document.getElementById('devicesList');
      this.deviceIdDisplay = document.getElementById('deviceIdDisplay');
      this.connStatusSpan = document.getElementById('connStatus');
      this.connPill = document.getElementById('connPill');
      
      this.init();
    }
    
    generateDeviceId() {
      let id = localStorage.getItem('walkie_device_id_rt');
      if (!id) {
        id = 'HH-' + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('walkie_device_id_rt', id);
      }
      return id;
    }
    
    async init() {
      this.deviceIdDisplay.textContent = `ID: ${this.deviceId}`;
      await this.initMicrophone();
      this.connectWebSocket();
      this.setupUIEvents();
      this.startHeartbeat();
    }
    
    async initMicrophone() {
      try {
        this.localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        this.sourceNode = this.audioContext.createMediaStreamSource(this.localStream);
        
        // Analizador para VU meter
        const analyser = this.audioContext.createAnalyser();
        analyser.fftSize = 256;
        this.sourceNode.connect(analyser);
        this.startVUMeter(analyser);
        
        this.statusText.innerHTML = '🎤 Micrófono listo · Presiona para hablar';
        this.showToast('Micrófono activado', 2000);
      } catch (err) {
        console.error('Error micrófono:', err);
        this.statusText.innerHTML = '❌ Error: Sin acceso al micrófono';
        this.showToast('No se pudo acceder al micrófono', 3000);
      }
    }
    
    startVUMeter(analyser) {
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      const updateVU = () => {
        if (!this.vumeterFill) return;
        analyser.getByteTimeDomainData(dataArray);
        let maxSample = 0;
        for (let i = 0; i < dataArray.length; i++) {
          const v = (dataArray[i] - 128) / 128;
          maxSample = Math.max(maxSample, Math.abs(v));
        }
        let level = Math.min(100, maxSample * 100);
        if (this.isTransmitting) {
          level = Math.max(level, 15);
          this.vumeterFill.style.width = level + '%';
        } else {
          this.vumeterFill.style.width = '0%';
        }
        requestAnimationFrame(updateVU);
      };
      updateVU();
    }
    
    connectWebSocket() {
      // Usamos un servidor público de señalización WebSocket
      // Para demo, usamos un servidor público simple (wss://echo.websocket.org no soporta WebRTC)
      // Implementamos con servidor de señalización local simulado + BroadcastChannel como fallback
      // Para verdadero P2P necesitaríamos un signaling server, pero para demo usamos WebRTC + BroadcastChannel para señalización
      
      this.setupSignalingViaBroadcast();
    }
    
    setupSignalingViaBroadcast() {
      // Usamos BroadcastChannel para señalización entre pestañas (mismo dispositivo)
      // Para dispositivos diferentes, recomendar usar el mismo navegador o compartir pantalla
      this.signalingChannel = new BroadcastChannel('walkie_rt_signaling');
      this.signalingChannel.onmessage = (event) => {
        this.handleSignalingMessage(event.data);
      };
      
      // Anunciar presencia
      this.announcePresence();
      this.netLed.classList.add('active');
      this.connStatusSpan.innerHTML = 'Canal activo';
      this.connPill.classList.add('on');
      
      // Simular red para demo: crear conexiones con otros pares
      setTimeout(() => {
        this.discoverPeers();
      }, 500);
    }
    
    announcePresence() {
      this.signalingChannel.postMessage({
        type: 'announce',
        deviceId: this.deviceId,
        timestamp: Date.now()
      });
    }
    
    discoverPeers() {
      // Solicitar lista de pares
      this.signalingChannel.postMessage({
        type: 'discover',
        deviceId: this.deviceId
      });
    }
    
    handleSignalingMessage(data) {
      switch(data.type) {
        case 'announce':
          this.addDevice(data.deviceId);
          // Si no tenemos conexión con este dispositivo, iniciar
          if (data.deviceId !== this.deviceId && !this.peerConnections.has(data.deviceId)) {
            this.createPeerConnection(data.deviceId, true);
          }
          break;
        case 'discover':
          // Responder con anuncio
          this.announcePresence();
          break;
        case 'offer':
          this.handleOffer(data);
          break;
        case 'answer':
          this.handleAnswer(data);
          break;
        case 'ice-candidate':
          this.handleIceCandidate(data);
          break;
        case 'start-transmit':
          if (data.deviceId !== this.deviceId) {
            this.handleStartTransmit(data.deviceId);
          }
          break;
        case 'stop-transmit':
          if (data.deviceId !== this.deviceId) {
            this.handleStopTransmit(data.deviceId);
          }
          break;
      }
    }
    
    addDevice(deviceId) {
      if (!this.devices.has(deviceId) && deviceId !== this.deviceId) {
        this.devices.set(deviceId, { name: deviceId, lastSeen: Date.now() });
        this.updateDevicesList();
        this.showToast(`📡 ${deviceId} se ha conectado`, 2000);
      }
    }
    
    updateDevicesList() {
      const devices = Array.from(this.devices.keys());
      if (devices.length === 0) {
        this.devicesList.innerHTML = '<span class="device-chip">📻 Esperando handhelds...</span>';
        return;
      }
      this.devicesList.innerHTML = devices.map(id => 
        `<span class="device-chip ${id === this.deviceId ? 'self' : ''}">
          ${id === this.deviceId ? '📱 ' : '📡 '}${id}
        </span>`
      ).join('');
    }
    
    createPeerConnection(remoteId, initiator = false) {
      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });
      
      // Añadir tracks locales cuando se esté transmitiendo
      if (this.localStream) {
        const senders = pc.getSenders();
        if (senders.length === 0 && this.localStream) {
          this.localStream.getTracks().forEach(track => {
            pc.addTrack(track, this.localStream);
          });
        }
      }
      
      pc.onicecandidate = (event) => {
        if (event.candidate) {
          this.signalingChannel.postMessage({
            type: 'ice-candidate',
            candidate: event.candidate,
            targetId: remoteId,
            fromId: this.deviceId
          });
        }
      };
      
      pc.ontrack = (event) => {
        // Recibir audio de otro dispositivo
        this.handleRemoteTrack(event.streams[0], remoteId);
      };
      
      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          this.showToast(`🔊 Conectado con ${remoteId}`, 1500);
        } else if (pc.connectionState === 'disconnected') {
          this.peerConnections.delete(remoteId);
          this.devices.delete(remoteId);
          this.updateDevicesList();
        }
      };
      
      this.peerConnections.set(remoteId, pc);
      
      if (initiator) {
        this.createOffer(remoteId);
      }
      
      return pc;
    }
    
    async createOffer(remoteId) {
      const pc = this.peerConnections.get(remoteId);
      if (!pc) return;
      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        this.signalingChannel.postMessage({
          type: 'offer',
          offer: offer,
          targetId: remoteId,
          fromId: this.deviceId
        });
      } catch (err) {
        console.error('Error creating offer:', err);
      }
    }
    
    async handleOffer(data) {
      if (data.fromId === this.deviceId) return;
      let pc = this.peerConnections.get(data.fromId);
      if (!pc) {
        pc = this.createPeerConnection(data.fromId, false);
      }
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        this.signalingChannel.postMessage({
          type: 'answer',
          answer: answer,
          targetId: data.fromId,
          fromId: this.deviceId
        });
      } catch (err) {
        console.error('Error handling offer:', err);
      }
    }
    
    async handleAnswer(data) {
      const pc = this.peerConnections.get(data.fromId);
      if (pc && pc.remoteDescription === null) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      }
    }
    
    async handleIceCandidate(data) {
      const pc = this.peerConnections.get(data.fromId);
      if (pc) {
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    }
    
    handleRemoteTrack(stream, fromId) {
      // Reproducir audio recibido
      const audio = new Audio();
      audio.srcObject = stream;
      audio.play().catch(e => console.log('Auto-play bloqueado'));
      this.rxLed.classList.add('active');
      setTimeout(() => this.rxLed.classList.remove('active'), 300);
      this.showToast(`🔊 Recibiendo audio de ${fromId}`, 1000);
    }
    
    startTransmitting() {
      if (this.isTransmitting || !this.localStream) return;
      this.isTransmitting = true;
      this.txLed.classList.add('recording');
      this.statusText.innerHTML = '🔴 TRANSMITIENDO · Hablando...';
      
      // Activar todos los tracks locales en todas las conexiones
      this.peerConnections.forEach((pc, remoteId) => {
        const senders = pc.getSenders();
        if (senders.length === 0 && this.localStream) {
          this.localStream.getTracks().forEach(track => {
            pc.addTrack(track, this.localStream);
          });
        } else {
          senders.forEach(sender => {
            if (sender.track) sender.track.enabled = true;
          });
        }
      });
      
      // Notificar a otros que empezamos a transmitir
      this.signalingChannel.postMessage({
        type: 'start-transmit',
        deviceId: this.deviceId
      });
      
      // Vibración al empezar
      if (navigator.vibrate) navigator.vibrate(50);
    }
    
    stopTransmitting() {
      if (!this.isTransmitting) return;
      this.isTransmitting = false;
      this.txLed.classList.remove('recording');
      this.statusText.innerHTML = '🎙️ Listo · Presiona para hablar';
      
      // Desactivar envío de audio
      this.peerConnections.forEach((pc) => {
        const senders = pc.getSenders();
        senders.forEach(sender => {
          if (sender.track) sender.track.enabled = false;
        });
      });
      
      // Notificar fin de transmisión
      this.signalingChannel.postMessage({
        type: 'stop-transmit',
        deviceId: this.deviceId
      });
      
      if (navigator.vibrate) navigator.vibrate(40);
    }
    
    handleStartTransmit(fromId) {
      this.rxLed.classList.add('active');
      this.statusText.innerHTML = `📢 ${fromId} está hablando...`;
      setTimeout(() => {
        if (!this.isTransmitting) {
          this.statusText.innerHTML = '🎙️ Listo · Presiona para hablar';
        }
      }, 2000);
    }
    
    handleStopTransmit(fromId) {
      this.rxLed.classList.remove('active');
      if (!this.isTransmitting) {
        this.statusText.innerHTML = '🎙️ Listo · Presiona para hablar';
      }
    }
    
    setupUIEvents() {
      // Push to Talk - mantener presionado
      this.pttBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        this.startTransmitting();
      });
      this.pttBtn.addEventListener('mouseup', () => {
        this.stopTransmitting();
      });
      this.pttBtn.addEventListener('mouseleave', () => {
        this.stopTransmitting();
      });
      this.pttBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        this.startTransmitting();
      });
      this.pttBtn.addEventListener('touchend', () => {
        this.stopTransmitting();
      });
      this.pttBtn.addEventListener('touchcancel', () => {
        this.stopTransmitting();
      });
      
      // Botón probar audio
      document.getElementById('testAudioBtn').addEventListener('click', () => {
        this.testAudio();
      });
      
      // Botón copiar ID
      document.getElementById('copyIdBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(this.deviceId);
        this.showToast('ID copiado: ' + this.deviceId, 2000);
      });
      
      // Botón compartir
      document.getElementById('shareBtn').addEventListener('click', () => {
        if (navigator.share) {
          navigator.share({
            title: 'Walkie Talkie',
            text: `Únete a mi canal con ID: ${this.deviceId}`,
            url: window.location.href
          });
        } else {
          this.showToast('Comparte este enlace con otros handhelds', 2000);
        }
      });
    }
    
    testAudio() {
      if (!this.audioContext) return;
      const beep = this.audioContext.createOscillator();
      const gain = this.audioContext.createGain();
      beep.connect(gain);
      gain.connect(this.audioContext.destination);
      beep.frequency.value = 880;
      gain.gain.value = 0.3;
      beep.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, this.audioContext.currentTime + 0.5);
      beep.stop(this.audioContext.currentTime + 0.5);
      this.showToast('🔊 Audio de prueba', 1000);
    }
    
    startHeartbeat() {
      setInterval(() => {
        this.announcePresence();
        // Limpiar dispositivos antiguos (más de 10 seg sin heartbeat)
        const now = Date.now();
        let changed = false;
        this.devices.forEach((device, id) => {
          if (now - device.lastSeen > 10000 && id !== this.deviceId) {
            this.devices.delete(id);
            this.peerConnections.delete(id);
            changed = true;
          }
        });
        if (changed) this.updateDevicesList();
      }, 5000);
    }
    
    showToast(msg, duration = 2000) {
      const toast = document.getElementById('toastMsg');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }
  }
  
  // Iniciar walkie talkie cuando el DOM esté listo
  document.addEventListener('DOMContentLoaded', () => {
    window.walkie = new RealTimeWalkieTalkie();
  });
</script>
